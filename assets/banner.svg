<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-label="Knapsack GA — solving the 0/1 knapsack with a genetic algorithm">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1206"/>
      <stop offset="0.55" stop-color="#44403c"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="380" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="380" rx="20" fill="url(#glow)"/>

  <!-- MOTIF: gold line-art knapsack/backpack + DNA helix -->
  <g transform="translate(980,190)" stroke="#fbbf24" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <!-- backpack body -->
    <path d="M -78 -28 q 0 -52 52 -52 q 52 0 52 52 l 0 96 q 0 18 -18 18 l -68 0 q -18 0 -18 -18 z"/>
    <!-- top grab handle -->
    <path d="M -42 -78 q 16 -26 42 -26 q 26 0 42 26"/>
    <!-- front pocket -->
    <path d="M -52 26 l 0 30 q 0 10 10 10 l 56 0 q 10 0 10 -10 l 0 -30"/>
    <line x1="-58" y1="26" x2="62" y2="26"/>
    <!-- DNA helix to the right -->
    <g transform="translate(96,-4)">
      <path d="M -10 -56 q 40 28 0 56 q -40 28 0 56"/>
      <path d="M 26 -56 q -40 28 0 56 q 40 28 0 56"/>
      <line x1="-8" y1="-38" x2="24" y2="-38"/>
      <line x1="-2" y1="-8" x2="18" y2="-8"/>
      <line x1="-2" y1="22" x2="18" y2="22"/>
      <line x1="-8" y1="52" x2="24" y2="52"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="80" y="160" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="78" font-weight="800" fill="#ffffff">Knapsack GA</text>
  <text x="84" y="232" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" fill="#fbbf24">0/1 Knapsack · Genetic Algorithm</text>
  <text x="84" y="288" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" fill="#fafaf9">Evolving binary chromosomes to pack the most value into the bag.</text>
  <text x="84" y="324" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#fcd34d">python · genetic-algorithm · optimization · combinatorial · stdlib-only</text>
</svg>
